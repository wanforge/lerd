name: Build Base Images

on:
  push:
    branches: [main]
    paths:
      - 'internal/podman/quadlets/lerd-php-fpm.Containerfile'
      - 'internal/podman/devtools/**'
      - '.github/workflows/base-images.yml'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild for upstream updates'
        required: false
        default: 'false'

jobs:
  build:
    name: PHP ${{ matrix.php }} (${{ matrix.arch.name }})
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        php: ["7.4", "8.0", "8.1", "8.2", "8.3", "8.4", "8.5"]
        arch:
          - { name: amd64, runner: ubuntu-latest }
          - { name: arm64, runner: ubuntu-24.04-arm }

    steps:
      - uses: actions/checkout@v4

      - name: Compute base image tag and short version
        id: tag
        run: |
          python3 - <<'EOF'
          import hashlib
          with open('internal/podman/quadlets/lerd-php-fpm.Containerfile') as f:
              content = f.read()
          content = content.replace('{{.CustomExtensions}}', '')
          content = content.replace('{{.CustomExtensionsRuntime}}', '')
          content = content.replace('{{.CustomPackages}}', '')
          content = content.replace('{{.MkcertCA}}', '')
          h = hashlib.sha256(content.encode()).hexdigest()[:12]
          print(f'Computed base image tag: {h}')
          with open('/tmp/tag_output', 'w') as f:
              f.write(f'tag={h}\n')
          EOF
          cat /tmp/tag_output >> "$GITHUB_OUTPUT"
          PHP_SHORT=$(echo "${{ matrix.php }}" | tr -d '.')
          echo "php_short=${PHP_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Preprocess Containerfile
        run: |
          python3 - "${{ matrix.php }}" <<'EOF'
          import sys
          version = sys.argv[1]
          with open('internal/podman/quadlets/lerd-php-fpm.Containerfile') as f:
              content = f.read()
          content = content.replace('{{.Version}}', version)
          content = content.replace('{{.CustomExtensions}}', '')
          content = content.replace('{{.CustomExtensionsRuntime}}', '')
          content = content.replace('{{.CustomPackages}}', '')
          content = content.replace('{{.MkcertCA}}', '')
          with open('/tmp/Containerfile', 'w') as f:
              f.write(content)
          EOF

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image already exists
        id: check
        run: |
          if [ "${{ inputs.force_rebuild }}" = "true" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Force rebuild requested, skipping existence check."
          else
            IMG="ghcr.io/geodro/lerd-php${{ steps.tag.outputs.php_short }}-fpm-base:${{ steps.tag.outputs.tag }}-${{ matrix.arch.name }}"
            if docker manifest inspect "$IMG" > /dev/null 2>&1; then
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "Image already exists, skipping build."
            else
              echo "exists=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.check.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: /tmp/Containerfile
          push: true
          pull: ${{ inputs.force_rebuild == 'true' }}
          platforms: linux/${{ matrix.arch.name }}
          tags: ghcr.io/geodro/lerd-php${{ steps.tag.outputs.php_short }}-fpm-base:${{ steps.tag.outputs.tag }}-${{ matrix.arch.name }}
          cache-from: type=gha,scope=php-${{ matrix.php }}-${{ matrix.arch.name }}
          cache-to: type=gha,mode=max,scope=php-${{ matrix.php }}-${{ matrix.arch.name }}

      - name: Smoke-test built image
        if: steps.check.outputs.exists != 'true'
        run: |
          IMG="ghcr.io/geodro/lerd-php${{ steps.tag.outputs.php_short }}-fpm-base:${{ steps.tag.outputs.tag }}-${{ matrix.arch.name }}"
          docker pull "$IMG" >/dev/null
          MODULES=$(docker run --rm "$IMG" php -m 2>&1 | grep -v '^\[' | sort -u)
          COUNT=$(echo "$MODULES" | grep -c .)
          echo "PHP ${{ matrix.php }}: $COUNT modules loaded"
          echo "$MODULES"
          # Drift guard: catch silent extension drops from Containerfile edits.
          # 50 is the safe floor; new modules push the count up, removed ones
          # trip the check here instead of in users' rebuilds.
          if [ "$COUNT" -lt 50 ]; then
            echo "::error::PHP ${{ matrix.php }} module count dropped to $COUNT (expected >=50)"
            exit 1
          fi
          # Spot check the load-bearing ones every framework needs.
          REQUIRED="curl gd intl mbstring pdo_mysql redis xdebug zip"
          MISSING=""
          for ext in $REQUIRED; do
            echo "$MODULES" | grep -qxF "$ext" || MISSING="$MISSING $ext"
          done
          if [ -n "$MISSING" ]; then
            echo "::error::Critical PHP extensions missing from PHP ${{ matrix.php }}:$MISSING"
            exit 1
          fi
          docker run --rm "$IMG" php -r 'exit(count(PDO::getAvailableDrivers()) >= 3 ? 0 : 1);'
          docker run --rm "$IMG" composer --version >/dev/null

  manifest:
    name: Manifest PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        php: ["7.4", "8.0", "8.1", "8.2", "8.3", "8.4", "8.5"]

    steps:
      - uses: actions/checkout@v4

      - name: Compute base image tag and short version
        id: tag
        run: |
          python3 - <<'EOF'
          import hashlib
          with open('internal/podman/quadlets/lerd-php-fpm.Containerfile') as f:
              content = f.read()
          content = content.replace('{{.CustomExtensions}}', '')
          content = content.replace('{{.CustomExtensionsRuntime}}', '')
          content = content.replace('{{.CustomPackages}}', '')
          content = content.replace('{{.MkcertCA}}', '')
          h = hashlib.sha256(content.encode()).hexdigest()[:12]
          with open('/tmp/tag_output', 'w') as f:
              f.write(f'tag={h}\n')
          EOF
          cat /tmp/tag_output >> "$GITHUB_OUTPUT"
          PHP_SHORT=$(echo "${{ matrix.php }}" | tr -d '.')
          echo "php_short=${PHP_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if manifest already exists
        id: check
        run: |
          if [ "${{ inputs.force_rebuild }}" = "true" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Force rebuild requested, recreating manifest."
          else
            IMG="ghcr.io/geodro/lerd-php${{ steps.tag.outputs.php_short }}-fpm-base:${{ steps.tag.outputs.tag }}"
            if docker manifest inspect "$IMG" > /dev/null 2>&1; then
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "Manifest already exists, skipping."
            else
              echo "exists=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Create and push multi-arch manifest
        if: steps.check.outputs.exists != 'true'
        run: |
          BASE="ghcr.io/geodro/lerd-php${{ steps.tag.outputs.php_short }}-fpm-base"
          TAG="${{ steps.tag.outputs.tag }}"
          docker buildx imagetools create \
            --tag "${BASE}:${TAG}" \
            "${BASE}:${TAG}-amd64" \
            "${BASE}:${TAG}-arm64"
