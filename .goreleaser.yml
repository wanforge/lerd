version: 2

project_name: lerd

before:
  hooks:
    - go mod tidy

builds:
  - id: lerd-amd64
    main: ./cmd/lerd
    binary: lerd
    env:
      - CGO_ENABLED=0
    flags:
      - -tags=nogui
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X github.com/geodro/lerd/internal/version.Version={{.Version}}
      - -X github.com/geodro/lerd/internal/version.Commit={{.Commit}}
      - -X github.com/geodro/lerd/internal/version.Date={{.Date}}

  - id: lerd-arm64
    main: ./cmd/lerd
    binary: lerd
    env:
      - CGO_ENABLED=0
    flags:
      - -tags=nogui
    goos:
      - linux
    goarch:
      - arm64
    ldflags:
      - -s -w
      - -X github.com/geodro/lerd/internal/version.Version={{.Version}}
      - -X github.com/geodro/lerd/internal/version.Commit={{.Commit}}
      - -X github.com/geodro/lerd/internal/version.Date={{.Date}}

  - id: lerd-darwin-amd64
    main: ./cmd/lerd
    binary: lerd
    env:
      - CGO_ENABLED=0
    flags:
      - -tags=nogui
    goos:
      - darwin
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X github.com/geodro/lerd/internal/version.Version={{.Version}}
      - -X github.com/geodro/lerd/internal/version.Commit={{.Commit}}
      - -X github.com/geodro/lerd/internal/version.Date={{.Date}}

  - id: lerd-darwin-arm64
    main: ./cmd/lerd
    binary: lerd
    env:
      - CGO_ENABLED=0
    flags:
      - -tags=nogui
    goos:
      - darwin
    goarch:
      - arm64
    ldflags:
      - -s -w
      - -X github.com/geodro/lerd/internal/version.Version={{.Version}}
      - -X github.com/geodro/lerd/internal/version.Commit={{.Commit}}
      - -X github.com/geodro/lerd/internal/version.Date={{.Date}}

  # lerd-tray is a separate CGO binary that links libayatana-appindicator.
  # lerd (nogui) execs it at runtime; if the library is missing the tray
  # is silently skipped and everything else continues to work.
  - id: lerd-tray-amd64
    main: ./cmd/lerd-tray
    binary: lerd-tray
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X github.com/geodro/lerd/internal/version.Version={{.Version}}
      - -X github.com/geodro/lerd/internal/version.Commit={{.Commit}}
      - -X github.com/geodro/lerd/internal/version.Date={{.Date}}

archives:
  - id: lerd-amd64
    ids: [lerd-amd64, lerd-tray-amd64]
    name_template: "lerd_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    files:
      - README.md
      - install.sh

  - id: lerd-arm64
    ids: [lerd-arm64]
    name_template: "lerd_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    files:
      - README.md
      - install.sh

  - id: lerd-darwin-amd64
    ids: [lerd-darwin-amd64]
    name_template: "lerd_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    files:
      - README.md
      - install.sh

  - id: lerd-darwin-arm64
    ids: [lerd-darwin-arm64]
    name_template: "lerd_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    files:
      - README.md
      - install.sh
      - src: dist-tray/lerd-tray-darwin-arm64/lerd-tray
        dst: lerd-tray
        info:
          mode: 0755

brews:
  - name: lerd
    ids:
      - lerd-darwin-amd64
      - lerd-darwin-arm64
    repository:
      owner: geodro
      name: homebrew-lerd
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/geodro/lerd"
    description: "Local Laravel development environment for Linux and macOS"
    license: "MIT"
    skip_upload: auto
    dependencies:
      - name: podman
    install: |
      bin.install "lerd"
      bin.install "lerd-tray" if File.exist?("lerd-tray")
    caveats: |
      To finish setting up Lerd, run:
        lerd install

      To uninstall cleanly, run in order:
        lerd uninstall
        brew uninstall lerd

      If you already removed the binary before running `lerd uninstall`, run:
        ~/.local/bin/lerd-cleanup
        brew uninstall lerd

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
    - title: Other
      order: 999

release:
  github:
    owner: geodro
    name: lerd
  name_template: "v{{ .Version }}"
  draft: false
  prerelease: auto
  replace_existing_artifacts: true
  header: |
    ## Lerd {{ .Version }}

    Lerd — Podman-powered local PHP dev environment for Linux & macOS.

    ### Install on Linux

    ```bash
    curl -fsSL https://raw.githubusercontent.com/geodro/lerd/main/install.sh | bash
    ```

    Or if already installed:

    ```bash
    lerd update
    ```

    ### Install on macOS

    ```bash
    brew tap geodro/lerd
    brew install lerd
    lerd install
    ```

    Or if already installed:

    ```bash
    brew upgrade lerd
    lerd install
    ```
  footer: |
    **Full Changelog**: https://github.com/geodro/lerd/compare/{{ .PreviousTag }}...{{ .Tag }}
